<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>U-TV Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --brand: #ff4f00; --bg: #05070a; --card: #12141b; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin:0; }
        .glass-nav { background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .movie-card { border-radius: 12px; background: var(--card); overflow: hidden; aspect-ratio: 2/3; position: relative; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; cursor: pointer; }
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #080a0d; border-top: 1px solid #1a1d23; display: flex; justify-content: space-around; padding: 10px 0 25px 0; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #555; }
        .nav-item.active { color: var(--brand); }
        #fullPlayer { display: none; position: fixed; inset: 0; background: #000; z-index: 500000; flex-direction: column; }
        iframe { width: 100%; height: 100%; background: #000; }
        .shimmer { background: linear-gradient(90deg, #12141b 25%, #1c1f26 50%, #12141b 75%); background-size: 200% 100%; animation: load 1.5s infinite; }
        @keyframes load { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body onload="init()">

    <header class="glass-nav fixed top-0 w-full z-[100] px-5 py-4 flex items-center justify-between">
        <h1 class="text-2xl font-black italic text-orange-600">U-TV</h1>
        <div class="flex-1 max-w-[70%] ml-4 relative">
            <input type="text" id="gSearch" onkeyup="if(event.key==='Enter')globalSearch()" placeholder="Search movies..." class="w-full bg-[#15181f] rounded-full py-2 px-10 text-xs border border-transparent focus:border-orange-600 text-white">
        </div>
    </header>

    <main class="pt-24 pb-32 px-4">
        <div id="heroBox" class="h-44 w-full rounded-2xl shimmer mb-8 overflow-hidden"></div>
        <h2 id="gridTitle" class="text-sm font-black mb-4 uppercase tracking-widest"><span class="w-1 h-4 bg-orange-600 inline-block mr-2"></span> Popular Worldwide</h2>
        <div id="mainGrid" class="grid grid-cols-3 gap-3"></div>
        <div id="loadPoint" class="py-12 flex justify-center"><div class="w-6 h-6 border-2 border-orange-600 border-t-transparent rounded-full animate-spin"></div></div>
    </main>

    <nav class="bottom-bar">
        <div class="nav-item active" onclick="location.reload()"><span>🏠</span><span>HOME</span></div>
        <div class="nav-item" onclick="globalSearch('hindi')"><span>🎬</span><span>HINDI</span></div>
        <div class="nav-item" onclick="globalSearch('series')"><span>📺</span><span>SERIES</span></div>
    </nav>

    <div id="fullPlayer">
        <div class="p-4 flex items-center justify-between bg-black"><button onclick="exitPlayer()" class="text-2xl">✕</button><span id="pName" class="font-bold text-[10px] uppercase"></span></div>
        <iframe id="iframePro" allowfullscreen frameborder="0"></iframe>
    </div>

    <div id="install-banner" style="display:none; position:fixed; bottom:100px; left:5%; right:5%; background: linear-gradient(135deg, #ff4f00, #ff8c00); padding: 20px; border-radius: 20px; z-index: 1000000; box-shadow: 0 15px 35px rgba(255,79,0,0.4); text-align: center; border: 2px solid rgba(255,255,255,0.2);">
        <h3 style="margin:0; font-size:18px; font-weight:900; color:white;">U-TV INSTALL करें!</h3>
        <p style="margin:5px 0 15px; font-size:12px; color:white; opacity:0.9;">मूवीज़ के लिए असली ऐप इंस्टॉल करें</p>
        <button id="btn-install" style="background: #fff; color: #ff4f00; border: none; padding: 12px 40px; border-radius: 50px; font-weight: 900; cursor: pointer;">अभी इंस्टॉल करें</button>
    </div>

    <script>
        const KEYS = ['174d0214bf933dd59b3d5ec68a0c967f'];
        let pg = 1;

        async function api(path) {
            const r = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?')?'&':'?'}api_key=${KEYS[0]}`);
            return await r.json();
        }

        async function init() {
            const tr = await api('/trending/all/day');
            const h = tr.results[0];
            document.getElementById('heroBox').innerHTML = `<img src="https://image.tmdb.org/t/p/original${h.backdrop_path}" class="w-full h-full object-cover">`;
            loadGrid();
        }

        async function loadGrid() {
            const d = await api(`/movie/popular?page=${pg}`);
            document.getElementById('mainGrid').innerHTML += d.results.map(m => `
                <div class="movie-card" onclick="playMedia('${m.id}', 'movie', '${(m.title||m.name).replace(/'/g,"")}')">
                    <img src="https://image.tmdb.org/t/p/w300${m.poster_path}" class="w-full h-full object-cover">
                </div>
            `).join('');
            pg++;
        }

        window.playMedia = function(id, type, title) {
            document.getElementById('fullPlayer').style.display = 'flex';
            document.getElementById('pName').innerText = title;
            document.getElementById('iframePro').src = `https://vidsrc.to/embed/${type}/${id}`;
        };

        window.exitPlayer = () => { document.getElementById('fullPlayer').style.display = 'none'; document.getElementById('iframePro').src = ''; };

        // PWA Install Logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'block';
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('install-banner').style.display = 'none';
            }
        });
    </script>
</body>
</html>
