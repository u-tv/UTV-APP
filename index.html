<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>U-TV Premium</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --brand: #ff4f00; --bg: #05070a; --card: #12141b; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin:0; overflow-x: hidden; }
        .glass-nav { background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .movie-card { border-radius: 12px; background: var(--card); overflow: hidden; aspect-ratio: 2/3; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; }
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #080a0d; border-top: 1px solid #1a1d23; display: flex; justify-content: space-around; padding: 10px 0 25px 0; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #555; cursor: pointer; }
        .nav-item.active { color: var(--brand); }
        #fullPlayer { display: none; position: fixed; inset: 0; background: #000; z-index: 500000; flex-direction: column; }
        iframe { width: 100%; height: 100%; border: none; }
        .shimmer { background: linear-gradient(90deg, #12141b 25%, #1c1f26 50%, #12141b 75%); background-size: 200% 100%; animation: load 1.5s infinite; }
        @keyframes load { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body>

    <header class="glass-nav fixed top-0 w-full z-[100] px-5 py-4 flex items-center justify-between">
        <h1 class="text-2xl font-black italic text-orange-600" onclick="location.reload()">U-TV</h1>
        <div class="flex-1 max-w-[70%] ml-4 relative">
            <input type="text" id="gSearch" placeholder="Search movies..." class="w-full bg-[#15181f] rounded-full py-2 px-10 text-xs border border-transparent focus:border-orange-600 text-white outline-none">
        </div>
    </header>

    <main class="pt-24 pb-32 px-4">
        <div id="heroBox" class="h-44 w-full rounded-2xl mb-8 overflow-hidden shimmer"></div>
        <h2 id="gridTitle" class="text-sm font-black mb-4 uppercase tracking-tighter text-orange-500">Popular Worldwide</h2>
        <div id="mainGrid" class="grid grid-cols-3 gap-3"></div>
        <div id="loadPoint" class="py-10 flex justify-center"><div class="w-6 h-6 border-2 border-orange-600 border-t-transparent rounded-full animate-spin"></div></div>
    </main>

    <nav class="bottom-bar">
        <div class="nav-item active" onclick="loadMovies('/movie/popular')"><span>🏠</span><span>HOME</span></div>
        <div class="nav-item" onclick="loadMovies('/discover/movie?with_original_language=hi')"><span>🎬</span><span>HINDI</span></div>
        <div class="nav-item" onclick="loadMovies('/tv/popular')"><span>📺</span><span>SERIES</span></div>
    </nav>

    <div id="fullPlayer">
        <div class="p-4 flex items-center justify-between bg-black border-b border-white/10">
            <button onclick="exitPlayer()" class="text-2xl">✕</button>
            <span id="pName" class="font-bold text-[10px] uppercase truncate px-4"></span>
        </div>
        <iframe id="iframePro" allowfullscreen></iframe>
    </div>

    <div id="install-banner" style="display:none; position:fixed; bottom:110px; left:20px; right:20px; background:linear-gradient(135deg, #ff4f00, #ff8c00); padding:20px; border-radius:20px; z-index:9999; text-align:center; box-shadow:0 15px 30px rgba(0,0,0,0.5);">
        <h3 style="margin:0; color:white; font-weight:900;">U-TV APP इंस्टॉल करें</h3>
        <p style="font-size:12px; color:white; margin:5px 0 15px;">Fast Streaming के लिए ऐप डाउनलोड करें</p>
        <button id="btn-install" style="background:white; color:#ff4f00; padding:10px 30px; border-radius:50px; border:none; font-weight:bold;">अभी इंस्टॉल करें</button>
    </div>

    <script>
        const API_KEY = '174d0214bf933dd59b3d5ec68a0c967f';
        let currentPage = 1;
        let currentPath = '/movie/popular';

        async function fetchAPI(path, page = 1) {
            const r = await fetch(`https://api.themoviedb.org/3${path}${path.includes('?')?'&':'?'}api_key=${API_KEY}&page=${page}`);
            return await r.json();
        }

        async function loadMovies(path, reset = true) {
            if(reset) {
                document.getElementById('mainGrid').innerHTML = '';
                currentPage = 1;
                currentPath = path;
                window.scrollTo(0,0);
            }
            const data = await fetchAPI(path, currentPage);
            const movies = data.results;
            
            if(reset && movies[0]) {
                document.getElementById('heroBox').innerHTML = `<img src="https://image.tmdb.org/t/p/w500${movies[0].backdrop_path}" class="w-full h-full object-cover">`;
            }

            document.getElementById('mainGrid').innerHTML += movies.map(m => `
                <div class="movie-card" onclick="playMedia('${m.id}', '${m.title ? 'movie' : 'tv'}', '${(m.title||m.name).replace(/'/g,"")}')">
                    <img src="https://image.tmdb.org/t/p/w342${m.poster_path}" class="w-full h-full object-cover" loading="lazy">
                </div>
            `).join('');
            currentPage++;
        }

        // Search Function
        document.getElementById('gSearch').addEventListener('keypress', async (e) => {
            if(e.key === 'Enter') {
                const q = e.target.value;
                if(q) {
                    currentPath = `/search/multi?query=${encodeURIComponent(q)}`;
                    loadMovies(currentPath);
                }
            }
        });

        // Auto Load More (Infinite Scroll)
        const observer = new IntersectionObserver(entries => {
            if(entries[0].isIntersecting) loadMovies(currentPath, false);
        }, {threshold: 1});
        observer.observe(document.getElementById('loadPoint'));

        window.playMedia = (id, type, title) => {
            document.getElementById('fullPlayer').style.display = 'flex';
            document.getElementById('pName').innerText = title;
            document.getElementById('iframePro').src = `https://vidsrc.to/embed/${type}/${id}`;
        };

        window.exitPlayer = () => {
            document.getElementById('fullPlayer').style.display = 'none';
            document.getElementById('iframePro').src = '';
        };

        // PWA Install Logic
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('install-banner').style.display = 'block';
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt = null;
                document.getElementById('install-banner').style.display = 'none';
            }
        });

        loadMovies(currentPath);
    </script>
</body>
</html>
