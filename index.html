<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>U-TV Movies - Premium App</title>
    
    <!-- PWA MANIFEST -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#05070a">
    
    <style>
        :root { --brand: #ff4f00; --bg: #05070a; --card: #12141b; }
        * { -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: #fff; 
            font-family: system-ui, sans-serif; 
            margin:0; overflow-x: hidden;
        }
        
        /* 3D INSTALL BANNER */
        #installBanner {
            display: none;
            position: fixed;
            bottom: 120px;
            left: 5%;
            right: 5%;
            background: linear-gradient(135deg, #ff4f00, #ff8c00);
            padding: 25px;
            border-radius: 25px;
            z-index: 9999;
            box-shadow: 0 20px 40px rgba(255,79,0,0.4);
            border: 3px solid rgba(255,255,255,0.3);
            text-align: center;
            transform: perspective(1000px) rotateX(10deg);
            animation: slideUp3D 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes slideUp3D {
            0% { transform: translateY(120px) perspective(1000px) rotateX(30deg); opacity: 0; }
            100% { transform: translateY(0) perspective(1000px) rotateX(10deg); opacity: 1; }
        }
        #installBtn {
            background: #fff;
            color: #ff4f00 !important;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            transition: all 0.3s;
            margin-top: 10px;
        }
        #installBtn:active { transform: scale(0.95) translateY(2px); }
        
        /* APP UI */
        .glass-nav { background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); position: fixed; top:0; width:100%; z-index:100; padding:12px 20px; }
        .movie-card { border-radius:12px; background:var(--card); aspect-ratio:2/3; border:1px solid rgba(255,255,255,0.05); overflow:hidden; cursor:pointer; position:relative; }
        .movie-card:active { transform: scale(0.95); }
        .bottom-bar { position:fixed; bottom:0; width:100%; background:rgba(8,10,13,0.95); border-top:1px solid #1a1d23; display:flex; justify-content:space-around; padding:12px 0 40px 0; z-index:1000; }
        .nav-item { display:flex; flex-direction:column; align-items:center; font-size:11px; color:#666; font-weight:700; padding:5px; }
        .nav-item.active { color:var(--brand); }
        #fullPlayer { position:fixed; inset:0; background:#000; z-index:5000; display:none; flex-direction:column; }
        iframe { width:100%; height:100%; background:#000; border:0; }
        .no-scrollbar::-webkit-scrollbar { display:none; }
    </style>
</head>
<body>

<!-- 3D INSTALL BANNER -->
<div id="installBanner">
    <h3 style="margin:0 0 10px 0; font-size:22px; font-weight:900; color:white;">📱 UTV MOVIES APP INSTALL</h3>
    <p style="margin:0 0 15px 0; font-size:14px; color:rgba(255,255,255,0.9);">Home screen पर premium movies के लिए</p>
    <button id="installBtn">अभी INSTALL करें ➤</button>
</div>

<!-- APP CONTENT (same ultra-fast code) -->
<div id="app" style="display:block">
    <header class="glass-nav">
        <div style="display:flex;align-items:center;justify-content:space-between;width:100%">
            <h1 style="margin:0;font-size:24px;font-weight:900;color:var(--brand);cursor:pointer" onclick="loadHome()">U-TV</h1>
            <div style="flex:1;max-width:70%;margin-left:20px;position:relative">
                <input id="searchInput" placeholder="🔍 Leo hindi / Jawan ta / Naruto jp" 
                       style="width:100%;padding:12px 45px 12px 15px;border-radius:25px;background:rgba(21,24,31,0.95);color:white;font-size:14px;border:1px solid transparent;box-sizing:border-box"
                       onkeyup="if(event.key==='Enter')searchMovies()">
                <span style="position:absolute;right:15px;top:50%;transform:translateY(-50%);color:#666;font-size:16px">⏎</span>
            </div>
        </div>
    </header>

    <main style="padding:80px 15px 120px 15px">
        <section style="margin-bottom:20px">
            <div id="hero" style="height:200px;border-radius:20px;background:#1a1d23;position:relative;overflow:hidden"></div>
        </section>
        <section>
            <h2 id="title" style="font-size:16px;font-weight:900;margin:0 0 20px 0;display:flex;align-items:center;gap:8px">
                <span style="width:4px;height:20px;background:var(--brand)"></span>Popular Worldwide
            </h2>
            <div id="movieGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px"></div>
            <div id="loader" style="padding:40px;text-align:center">
                <div style="width:28px;height:28px;border:3px solid var(--brand);border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 20px"></div>
                <span style="font-size:14px;color:#666">Loading movies...</span>
            </div>
        </section>
    </main>

    <nav class="bottom-bar">
        <div class="nav-item active" onclick="loadHome()"><span>🏠</span><span>HOME</span></div>
        <div class="nav-item" onclick="quickSearch('hindi')"><span>🇮🇳</span><span>HINDI</span></div>
        <div class="nav-item" onclick="quickSearch('series')"><span>📺</span><span>SERIES</span></div>
        <div class="nav-item" onclick="showHistory()"><span>⏰</span><span>HISTORY</span></div>
    </nav>
</div>

<!-- PLAYER -->
<div id="fullPlayer">
    <div style="padding:20px;display:flex;align-items:center;justify-content:space-between;background:rgba(0,0,0,0.95);border-bottom:1px solid rgba(255,255,255,0.1)">
        <button onclick="closePlayer()" style="font-size:30px;color:white;background:none;border:none;cursor:pointer;padding:0">✕</button>
        <span id="playerTitle" style="font-weight:900;font-size:13px;text-transform:uppercase;white-space:nowrap;overflow:hidden;max-width:60%"></span>
        <button id="downloadBtn" style="background:var(--brand);color:white;border:none;padding:10px 20px;border-radius:25px;font-size:12px;font-weight:900;cursor:pointer">📥 DOWNLOAD</button>
    </div>
    <div id="serverSelect" style="display:flex;gap:10px;padding:15px;background:rgba(8,10,13,0.95);overflow-x:auto;border-bottom:1px solid rgba(255,255,255,0.05)"></div>
    <div style="flex:1;background:black">
        <iframe id="videoFrame" allowfullscreen></iframe>
    </div>
</div>

<script>
/* ULTRA-FAST MOVIE APP */
let page=1, isLoading=false, isSearching=false, mode='home';
const API_KEYS=['174d0214bf933dd59b3d5ec68a0c967f','5bf61a62fd4647aa7debed7d6f2db079'];

// PWA 3D INSTALL
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    document.getElementById('installBanner').style.display = 'block';
});

document.getElementById('installBtn').onclick = async () => {
    if(deferredPrompt) {
        deferredPrompt.prompt();
        const {outcome} = await deferredPrompt.userChoice;
        if(outcome === 'accepted') {
            document.getElementById('installBanner').style.display = 'none';
            deferredPrompt = null;
        }
    }
};

window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').style.display = 'none';
});

// MOVIE FUNCTIONS (same ultra-fast)
async function fetchAPI(endpoint){/* same code as before */}
// ... (rest of movie functions remain exactly same)
</script>

</body>
</html>
