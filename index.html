<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>U-TV Premium</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --brand: #ff4f00; --bg: #05070a; --card: #12141b; }
        * { -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; font-family: system-ui, sans-serif; margin:0; }
        .glass-nav { background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); }
        .movie-card { border-radius: 12px; background: var(--card); aspect-ratio: 2/3; border: 1px solid rgba(255,255,255,0.03); transition: 0.3s; cursor: pointer; overflow: hidden; }
        .movie-card:active { transform: scale(0.92); }
        .bottom-bar { position: fixed; bottom: 0; width: 100%; background: #080a0d; border-top: 1px solid #1a1d23; display: flex; justify-content: space-around; padding: 10px 0 25px 0; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #555; font-weight: 700; }
        .nav-item.active { color: var(--brand); }
        #fullPlayer { position: fixed; inset: 0; background: #000; z-index: 500000; display: none; flex-direction: column; }
        iframe { width: 100%; height: 100%; background: #000; border:0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

<!-- MAIN APP (NO GATEWAY BLOCK) -->
<div id="app-layout" style="display:block;opacity:1">
    <header class="glass-nav fixed top-0 w-full z-[100] px-5 py-4 flex items-center justify-between">
        <h1 class="text-2xl font-black italic text-orange-600" onclick="location.reload()">U-TV</h1>
        <div class="flex-1 max-w-[70%] ml-4 relative">
            <input type="text" id="gSearch" onkeyup="if(event.key==='Enter')globalSearch()" placeholder="Search: Leo hindi / Jawan ta" class="w-full bg-[#15181f] rounded-full py-2 px-10 text-xs border border-transparent focus:border-orange-600">
            <span class="absolute left-4 top-2 text-xs">🔍</span>
        </div>
    </header>

    <main class="pt-24 pb-32 px-4">
        <section class="mb-8">
            <div id="heroBox" class="h-44 w-full rounded-2xl bg-gradient-to-r from-orange-600 to-orange-400 flex items-center justify-center">
                <span class="text-white font-black text-xl animate-pulse">LOADING TRENDING...</span>
            </div>
        </section>

        <section>
            <h2 id="gridTitle" class="text-sm font-black mb-4 flex items-center gap-2 uppercase tracking-widest">
                <span class="w-1 h-4 bg-orange-600"></span> Popular Worldwide
            </h2>
            <div id="mainGrid" class="grid grid-cols-3 gap-3"></div>
            <div id="loadPoint" class="py-12 flex justify-center">
                <div class="w-6 h-6 border-2 border-orange-600 border-t-transparent rounded-full animate-spin"></div>
            </div>
        </section>
    </main>

    <nav class="bottom-bar">
        <div class="nav-item active" onclick="location.reload()"><span>🏠</span><span>HOME</span></div>
        <div class="nav-item" onclick="globalSearch('hindi')"><span>🎬</span><span>HINDI</span></div>
        <div class="nav-item" onclick="globalSearch('series')"><span>📺</span><span>SERIES</span></div>
    </nav>
</div>

<!-- PLAYER -->
<div id="fullPlayer">
    <div class="p-4 flex items-center justify-between bg-black border-b border-white/5">
        <button onclick="exitPlayer()" class="text-2xl">✕</button>
        <span id="pName" class="font-bold text-[10px] truncate max-w-[60%] tracking-tighter uppercase"></span>
        <button id="dlBtn" class="bg-orange-600 px-3 py-1 rounded text-[10px] font-black">DOWNLOAD</button>
    </div>
    <div id="sSelect" class="flex gap-2 p-3 bg-[#080a0d] overflow-x-auto no-scrollbar border-b border-white/5"></div>
    <div class="flex-1 bg-black"><iframe id="iframePro" allowfullscreen></iframe></div>
</div>

<script>
let pg = 1, isSearching = false;

async function api(path) {
    const keys = ['174d0214bf933dd59b3d5ec68a0c967f', '5bf61a62fd4647aa7debed7d6f2db079'];
    for(let k of keys) {
        try {
            const r = await fetch(`https://api.themoviedb.org/3${path}?api_key=${k}&language=hi-IN`);
            return await r.json();
        } catch(e) {}
    }
    return {results:[]};
}

async function init() {
    const tr = await api('/trending/all/day');
    if(tr.results?.[0]) {
        const h = tr.results[0];
        document.getElementById('heroBox').innerHTML = `
            <img src="https://image.tmdb.org/t/p/original${h.backdrop_path}" class="w-full h-full object-cover opacity-50">
            <div class="absolute bottom-4 left-4"><h2 class="text-xl font-black italic uppercase">${h.title||h.name}</h2></div>
        `;
    }
    loadGrid();
}

function createCard(m) {
    const title = (m.title||m.name).replace(/'/g,"");
    const poster = m.poster_path ? `https://image.tmdb.org/t/p/w300${m.poster_path}` : 'https://via.placeholder.com/300x450?text=No+Image';
    return `<div class="w-full movie-card" onclick="playMedia('${m.id}', '${m.media_type||'movie'}', '${title}')">
        <img loading="lazy" src="${poster}" class="w-full h-full object-cover">
    </div>`;
}

async function loadGrid() {
    if(isSearching) return;
    const d = await api(`/movie/popular?page=${pg}`);
    document.getElementById('mainGrid').innerHTML += d.results.map(createCard).join('');
    pg++;
}

window.globalSearch = async function(preset='') {
    const q = preset || document.getElementById('gSearch').value;
    if(!q) return;
    isSearching = true;
    document.getElementById('gridTitle').innerText = `SEARCH: ${q.toUpperCase()}`;
    document.getElementById('mainGrid').innerHTML = '<div class="col-span-3 py-20 text-center text-orange-600 font-bold animate-pulse">Searching...</div>';
    
    const d = await api(`/search/multi?query=${encodeURIComponent(q)}`);
    document.getElementById('mainGrid').innerHTML = d.results.filter(i=>i.poster_path).map(createCard).join('');
    isSearching = false;
};

window.playMedia = function(id, type, title) {
    document.getElementById('fullPlayer').style.display = 'flex';
    document.getElementById('pName').innerText = title;
    
    const servers = [
        `https://vidsrc.to/embed/${type}/${id}`,
        `https://vidsrc.me/embed/${type}/${id}`,
        `https://vidsrc.xyz/embed/${type}/${id}`
    ];
    
    document.getElementById('sSelect').innerHTML = servers.map((u,i)=>`
        <button onclick="document.getElementById('iframePro').src='${u}'" class="bg-[#1a1d23] px-4 py-2 rounded-lg text-[10px] font-bold">${i+1}</button>
    `).join('');
    
    document.getElementById('iframePro').src = servers[0];
    document.getElementById('dlBtn').onclick = () => window.open(servers[0], '_blank');
};

window.exitPlayer = () => {
    document.getElementById('fullPlayer').style.display = 'none';
    document.getElementById('iframePro').src = '';
};

// AUTO START
setTimeout(init, 100);

// INFINITE SCROLL
new IntersectionObserver(e => {
    if(e[0].isIntersecting && !isSearching) loadGrid();
}).observe(document.getElementById('loadPoint'));
</script>
</body>
</html>
